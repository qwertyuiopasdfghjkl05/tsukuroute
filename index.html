<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" id="themeColorMeta" content="#FAF9F6">
<title></title>
<meta name="description" content="フリーランスのデザイナー・イラストレーター向け案件管理アプリ。相談から納品・請求・確定申告までひとつで管理。">
<meta property="og:type" content="website">
<meta property="og:title" content="つくルート">
<meta property="og:site_name" content="つくルート">
<meta property="og:description" content="フリーランスのデザイナー・イラストレーター向け案件管理アプリ。相談から納品・請求・確定申告までひとつで管理。">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="つくルート">
<meta name="twitter:description" content="フリーランスのデザイナー・イラストレーター向け案件管理アプリ。相談から納品・請求・確定申告までひとつで管理。">
<!-- 公開時: og:image / twitter:image は絶対URL（https://ドメイン/assets/ogp.png）に変更 -->
<meta property="og:image" content="assets/ogp.png">
<meta name="twitter:image" content="assets/ogp.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <aside class="demo-banner" id="demoBanner" hidden aria-label="デモモードのお知らせ">
    <span><strong>デモ版</strong> 入力した内容は保存されません。自由に操作して確認できます。</span>
    <button type="button" class="demo-banner__reset" data-action="reset-demo-data">デモデータをリセット</button>
  </aside>

  <!-- ===== ヘッダー ===== -->
  <header class="app-header">
    <div class="app-header__brand">
      <img class="app-header__logo" src="assets/logo.png" onerror="this.onerror=null;this.src='assets/logo.svg'" alt="">
      <span class="app-header__brand-copy"><span class="app-header__title"></span><small class="app-header__roman">TSUKUROUTE</small><small class="app-header__tagline">クリエイターの毎日を、やさしくつなぐ。</small></span>
    </div>

    <nav class="tabs" id="tabNav">
      <button class="tab-btn is-active" data-tab="home" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 11.5 12 4l8 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 10v9a1 1 0 0 0 1 1h3v-6h4v6h3a1 1 0 0 0 1-1v-9" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        <span>ホーム</span>
      </button>
      <button class="tab-btn" data-tab="calendar" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3.5" y="5" width="17" height="15.5" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7.5 3.5v3M16.5 3.5v3M4 9h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span>カレンダー</span>
      </button>
      <button class="tab-btn" data-tab="projects" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 8a2 2 0 0 1 2-2h3l2 2h7a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        <span>案件</span>
      </button>
      <button class="tab-btn" data-tab="money" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.2" stroke="currentColor" stroke-width="1.6"/><path d="M12 7.5v9M9.6 9.4c0-1 1-1.8 2.4-1.8s2.4.7 2.4 1.7c0 2.3-4.8 1.1-4.8 3.4 0 1 1 1.8 2.4 1.8s2.4-.8 2.4-1.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>お金</span>
      </button>
    </nav>

    <button class="settings-btn" id="openSettingsBtn" type="button" title="設定" aria-label="設定">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 13.6a7.6 7.6 0 0 0 0-3.2l1.9-1.4-1.6-2.7-2.2.8a7.6 7.6 0 0 0-2.8-1.6L14.3 3h-4.6l-.4 2.5a7.6 7.6 0 0 0-2.8 1.6l-2.2-.8-1.6 2.7 1.9 1.4a7.6 7.6 0 0 0 0 3.2l-1.9 1.4 1.6 2.7 2.2-.8a7.6 7.6 0 0 0 2.8 1.6l.4 2.5h4.6l.4-2.5a7.6 7.6 0 0 0 2.8-1.6l2.2.8 1.6-2.7-1.9-1.4Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      <span>設定</span>
    </button>
  </header>

  <!-- ===== メインコンテンツ ===== -->
  <main class="app-main">

    <!-- ホーム -->
    <section class="view is-active" id="view-home">
      <div class="view-inner" id="homeContent"></div>
    </section>

    <!-- カレンダー -->
    <section class="view" id="view-calendar">
      <div class="calendar-view-inner" id="calendarContent"></div>
    </section>

    <!-- 案件 -->
    <section class="view" id="view-projects">
      <div class="view-inner">
        <div class="segmented projects-section-toggle" id="projectsSectionToggle"><button class="segmented__btn is-active" data-action="set-projects-section" data-section="projects">案件</button><button class="segmented__btn" data-action="set-projects-section" data-section="gallery">作品</button></div>
        <div id="projectsSectionContent">
        <div class="view-toolbar">
          <h1 class="view-title">案件</h1>
          <div class="view-toolbar__actions">
            <button class="btn btn--primary" id="newProjectBtn" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              案件を追加
            </button>
          </div>
        </div>
        <div class="segmented projects-status-toggle" id="projectsStatusToggle" aria-label="案件の状態"></div>
        <div id="projectsListWrap"></div>
        </div>
        <div id="galleryContent" style="display:none;"></div>
      </div>
    </section>

    <!-- お金 -->
    <section class="view" id="view-money">
      <div class="view-inner" id="moneyContent"></div>
    </section>

    <!-- 設定 -->
    <section class="view" id="view-settings">
      <div class="view-inner" id="settingsViewContent"></div>
    </section>

  </main>

  <!-- ===== モバイル下部タブ ===== -->
  <nav class="tabbar" id="tabBar">
    <button class="tabbar__btn is-active" data-tab="home" type="button">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 11.5 12 4l8 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 10v9a1 1 0 0 0 1 1h3v-6h4v6h3a1 1 0 0 0 1-1v-9" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      <span>ホーム</span>
    </button>
    <button class="tabbar__btn" data-tab="calendar" type="button">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3.5" y="5" width="17" height="15.5" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7.5 3.5v3M16.5 3.5v3M4 9h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <span>カレンダー</span>
    </button>
    <button class="tabbar__btn" data-tab="projects" type="button">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 8a2 2 0 0 1 2-2h3l2 2h7a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      <span>案件</span>
    </button>
    <button class="tabbar__btn" data-tab="money" type="button">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.2" stroke="currentColor" stroke-width="1.6"/><path d="M12 7.5v9M9.6 9.4c0-1 1-1.8 2.4-1.8s2.4.7 2.4 1.7c0 2.3-4.8 1.1-4.8 3.4 0 1 1 1.8 2.4 1.8s2.4-.8 2.4-1.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span>お金</span>
    </button>
    <button class="tabbar__btn" data-tab="settings" type="button">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 13.6a7.6 7.6 0 0 0 0-3.2l1.9-1.4-1.6-2.7-2.2.8a7.6 7.6 0 0 0-2.8-1.6L14.3 3h-4.6l-.4 2.5a7.6 7.6 0 0 0-2.8 1.6l-2.2-.8-1.6 2.7 1.9 1.4" stroke="currentColor" stroke-width="1.3"/></svg>
      <span>設定</span>
    </button>
  </nav>

</div>

<!-- ===== モーダルルート（動的生成） ===== -->
<div id="modalRoot"></div>
<div id="sheetRoot"></div>

<!-- ===== トースト通知 ===== -->
<div id="toastRoot" class="toast-root" aria-live="polite"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
